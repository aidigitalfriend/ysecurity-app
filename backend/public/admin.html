<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sercret Security Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #map { height: 400px; }
        .device { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        button { margin: 5px; padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>Sercret Security Admin</h1>
    <div id="connection-status" style="padding: 10px; margin: 10px 0; border-radius: 5px; background: #e3f2fd;">🔄 Connecting...</div>
    <div id="devices"></div>
    <div id="map"></div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let map;
        let markers = {};
        let socket;
        let authToken = localStorage.getItem('authToken');

        // Initialize Socket.IO
        function initSocket() {
            socket = io('http://localhost:3000');

            socket.on('authenticated', (data) => {
                if (data.success) {
                    console.log('Socket authenticated');
                    document.getElementById('connection-status').textContent = '🟢 Connected (Real-time)';
                } else {
                    console.error('Socket authentication failed');
                }
            });

            socket.on('location-update', (data) => {
                updateDeviceLocation(data);
            });

            socket.on('command-sent', (data) => {
                console.log('Command sent:', data);
                alert('Command sent successfully');
            });

            socket.on('command-error', (error) => {
                console.error('Command error:', error);
                alert('Failed to send command: ' + error.error);
            });

            // Authenticate socket if we have a token
            if (authToken) {
                socket.emit('authenticate', authToken);
            }
        }
        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }

        // Load devices
        async function loadDevices() {
            try {
                const response = await fetch(`${API_BASE}/admin/devices`);
                const devices = await response.json();
                const container = document.getElementById('devices');
                container.innerHTML = '';
                devices.forEach(device => {
                    const div = document.createElement('div');
                    div.className = 'device';
                    div.innerHTML = `
                        <strong>${device.id}</strong> - ${device.model} (${device.status})
                        <button onclick="viewLocations('${device.id}')">View Locations</button>
                        <button onclick="markLost('${device.id}')">Mark as Lost</button>
                        <button onclick="sendCommand('${device.id}', 'alarm')">Trigger Alarm</button>
                        <button onclick="sendCommand('${device.id}', 'camera')">Take Photo</button>
                        <button onclick="sendGeofence('${device.id}')">Set Geofence</button>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                console.error('Failed to load devices:', error);
            }
        }

        // View locations and subscribe to real-time updates
        async function viewLocations(deviceId) {
            try {
                const response = await fetch(`${API_BASE}/admin/devices/${deviceId}/locations`);
                const locations = await response.json();

                if (locations.success) {
                    // Clear previous markers
                    Object.values(markers).forEach(marker => map.removeLayer(marker));
                    markers = {};

                    // Add historical locations
                    locations.locations.forEach(loc => {
                        const marker = L.marker([loc.latitude, loc.longitude]).addTo(map);
                        marker.bindPopup(`Time: ${loc.timestamp}<br>Battery: ${loc.battery}%`);
                        markers[loc.id] = marker;
                    });

                    if (locations.locations.length > 0) {
                        map.setView([locations.locations[0].latitude, locations.locations[0].longitude], 13);
                    }

                    // Subscribe to real-time updates for this device
                    if (socket) {
                        socket.emit('subscribe-locations', deviceId);
                    }
                }
            } catch (error) {
                console.error('Failed to load locations:', error);
            }
        }

        // Mark as lost
        async function markLost(deviceId) {
            try {
                await fetch(`${API_BASE}/admin/devices/${deviceId}/mark-lost`, { method: 'POST' });
                loadDevices();
            } catch (error) {
                console.error('Failed to mark as lost:', error);
            }
        }

        // Update device location in real-time
        function updateDeviceLocation(data) {
            const { deviceId, lat, lng, accuracy, battery, timestamp } = data;

            // Update or create marker
            if (markers[deviceId]) {
                markers[deviceId].setLatLng([lat, lng]);
                markers[deviceId].setPopupContent(`
                    <strong>Device: ${deviceId}</strong><br>
                    Time: ${new Date(timestamp).toLocaleString()}<br>
                    Battery: ${battery}%<br>
                    Accuracy: ${accuracy}m<br>
                    <em>Real-time update</em>
                `);
            } else {
                const marker = L.marker([lat, lng]).addTo(map);
                marker.bindPopup(`
                    <strong>Device: ${deviceId}</strong><br>
                    Time: ${new Date(timestamp).toLocaleString()}<br>
                    Battery: ${battery}%<br>
                    Accuracy: ${accuracy}m<br>
                    <em>Real-time update</em>
                `);
                markers[deviceId] = marker;
            }

            // Center map on update if this device is selected
            if (map.getBounds().contains([lat, lng])) {
                map.panTo([lat, lng]);
            }
        }

        // Send command via Socket.IO
        async function sendCommand(deviceId, command) {
            if (!socket) {
                alert('Real-time connection not available');
                return;
            }

            socket.emit('send-command', { deviceId, command });
        }
            }
        }

        // Send geofence
        async function sendGeofence(deviceId) {
            const lat = prompt('Enter latitude:');
            const lng = prompt('Enter longitude:');
            const radius = prompt('Enter radius (meters):');
            if (lat && lng && radius) {
                try {
                    await fetch(`${API_BASE}/admin/devices/${deviceId}/command`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            command: 'geofence',
                            params: { lat: parseFloat(lat), lng: parseFloat(lng), radius: parseFloat(radius) }
                        })
                    });
                    alert('Geofence set');
                } catch (error) {
                    console.error('Failed to set geofence:', error);
                }
            }
        }

        // Init
        initMap();
        initSocket();
        loadDevices();
    </script>
</body>
</html>
